name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  deno:
    name: Format / Lint / Check / Test (Deno)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Test with coverage
        run: deno task test:coverage

  node-compat:
    name: Node compatibility (stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Once packages are published (or `jsr publish --dry-run` artifacts are
      # available), this job installs them via JSR's npm compatibility layer
      # and runs the compat test suite under Node. See AI_GUIDELINES.md §4.5.
      - name: Placeholder
        run: echo "Node compat suite lands with Milestone 1 (first real package)."

  bun-compat:
    name: Bun compatibility (stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Same as node-compat, but running the compat suite under Bun.
      - name: Placeholder
        run: echo "Bun compat suite lands with Milestone 1 (first real package)."

  audit:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Native dependency audit (JSR + npm deps in deno.lock).
      # OSV-Scanner is not used: it has no deno.lock support.
      - name: Audit
        run: deno task audit
